<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaltFish Studio — 咸鱼工作室</title>
  <meta name="description" content="SaltFish Studio 咸鱼工作室 — 独立游戏开发团队，专注手工打造沉浸式视觉小说体验。">
  <link rel="icon" type="image/x-icon" href="veridian-codex/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="veridian-codex/img/icon-192.png">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060a14;
      --blue: #4db8ff;
      --purple: #9b7aff;
      --text: #c8d4e8;
      --dim: #384060;
    }
    body {
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(77,184,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(77,184,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .container {
      position: relative; z-index: 1;
      max-width: 640px; width: 100%; padding: 60px 32px;
      text-align: center;
    }

    /* Logo */
    .logo {
      width: 120px; margin-bottom: 24px; opacity: 0.8;
      filter: brightness(0) invert(1);
      animation: fadeIn 1s ease both;
    }
    .studio-name {
      font-size: 14px; letter-spacing: 6px; color: var(--dim);
      margin-bottom: 48px; text-transform: uppercase;
      animation: fadeIn 1s ease 0.2s both;
    }

    /* Intro */
    .intro {
      font-size: 15px; line-height: 2; color: var(--dim);
      margin-bottom: 48px;
      animation: fadeIn 1s ease 0.4s both;
    }
    .intro strong { color: var(--text); font-weight: 400; }

    /* Divider */
    .divider {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-bottom: 48px;
      animation: fadeIn 1s ease 0.5s both;
    }
    .divider::before, .divider::after {
      content: ''; width: 40px; height: 1px; background: var(--dim);
    }
    .divider span {
      font-size: 11px; letter-spacing: 4px; color: var(--dim);
    }

    /* Game Card */
    .game-card {
      display: block; text-decoration: none; color: inherit;
      border: 1px solid rgba(77,184,255,0.1);
      background: rgba(10,16,32,0.8);
      overflow: hidden; transition: all 0.5s cubic-bezier(.23,1,.32,1);
      animation: slideUp 0.8s ease 0.6s both;
    }
    .game-card:hover {
      border-color: rgba(77,184,255,0.3);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(77,184,255,0.08);
    }
    .game-card img {
      width: 100%; display: block;
      transition: transform 4s cubic-bezier(.23,1,.32,1);
    }
    .game-card:hover img { transform: scale(1.03); }
    .game-card-info { padding: 20px 24px; text-align: left; }
    .game-card-title {
      font-size: 18px; color: #fff; margin-bottom: 4px;
    }
    .game-card-sub {
      font-size: 12px; color: var(--dim); letter-spacing: 2px;
    }
    .game-card-tag {
      display: inline-block; font-size: 10px;
      padding: 2px 8px; margin-top: 10px;
      border: 1px solid rgba(77,184,255,0.3); color: var(--blue);
      letter-spacing: 1px;
    }

    /* CTA Buttons */
    .cta-row {
      display: flex; gap: 12px; justify-content: center; margin-top: 16px;
      animation: slideUp 0.8s ease 0.7s both;
    }
    .cta-row:first-of-type { margin-top: 28px; }
    .cta {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 11px 28px; font-size: 13px; letter-spacing: 2px;
      text-decoration: none; transition: all 0.35s;
      border: 1px solid rgba(77,184,255,0.4); color: var(--blue);
      background: rgba(77,184,255,0.06); flex: 1; max-width: 220px;
    }
    .cta:hover {
      background: rgba(77,184,255,0.15); border-color: var(--blue);
      transform: translateY(-2px); box-shadow: 0 6px 24px rgba(77,184,255,0.1);
    }
    .cta-alt {
      border-color: rgba(255,255,255,0.1); color: var(--dim);
      background: transparent;
    }
    .cta-alt:hover {
      border-color: rgba(255,255,255,0.25); color: var(--text);
      background: rgba(255,255,255,0.04); box-shadow: none;
    }
    .cta-steam {
      border-color: rgba(102,192,244,0.3); color: #9ecfe8;
      background: linear-gradient(135deg, rgba(27,40,56,0.6), rgba(42,71,94,0.4));
    }
    .cta-steam:hover {
      background: linear-gradient(135deg, rgba(42,71,94,0.8), rgba(61,107,142,0.5));
      border-color: rgba(102,192,244,0.5);
      box-shadow: 0 6px 24px rgba(102,192,244,0.08);
    }
    .div2 { margin-top: 40px; margin-bottom: 24px; }

    /* Social */
    .social {
      display: flex; gap: 14px; justify-content: center;
      margin-top: 48px;
      animation: fadeIn 1s ease 0.8s both;
    }
    .social a {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08); color: var(--dim);
      transition: all 0.3s; text-decoration: none;
    }
    .social a:hover {
      color: var(--blue); border-color: var(--blue);
      background: rgba(77,184,255,0.06);
    }
    .social svg { width: 16px; height: 16px; }

    /* Footer */
    .foot {
      margin-top: 56px; font-size: 11px; color: rgba(255,255,255,0.12);
      animation: fadeIn 1s ease 1s both;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }

    @media (max-width: 480px) {
      .container { padding: 40px 20px; }
      .logo { width: 90px; }
    }
  </style>
</head>
